version: "3.8"

services:
  db:
    image: postgres:15-alpine
    container_name: bookstore_db
    environment:
      POSTGRES_DB: bookstore
      POSTGRES_USER: bookstore
      POSTGRES_PASSWORD: bookstore123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - bookstore_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bookstore"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bookstore_backend
    command: >
      sh -c "
        while ! python manage.py inspectdb > /dev/null 2>&1; do
          echo 'Waiting for PostgreSQL...';
          sleep 2;
        done;
        echo 'PostgreSQL is ready!';
        python manage.py makemigrations books carts orders;
        python manage.py migrate;
        echo 'Migrations completed!';
        python manage.py runserver 0.0.0.0:8000
      "
    volumes:
      - ./backend:/app
    environment:
      - DEBUG=1
      - DB_NAME=bookstore
      - DB_USER=bookstore
      - DB_PASSWORD=bookstore123
      - DB_HOST=db
      - DB_PORT=5432
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - bookstore_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: bookstore_frontend
    ports:
      - "3001:3000"
    environment:
      - PORT=3000
      - HOST=0.0.0.0
      - ORIGIN=http://localhost:3000
    depends_on:
      - backend
    networks:
      - bookstore_network

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: bookstore_nginx
    ports:
      - "3000:80"
    depends_on:
      - frontend
      - backend
    networks:
      - bookstore_network

volumes:
  postgres_data:

networks:
  bookstore_network:
    driver: bridge
